name: Node.js Package

on:
  release:
    types: [created]

jobs: 
  build:  
    runs-on:  ubuntu-latest
    steps: 
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run:  npm ci
   
  publish-npm: 
    needs: build
    runs-on:  ubuntu-latest
    permissions: 
      contents: read
      id-token: write  # Required for Trusted Publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:  
          node-version: 20
          registry-url: 'https://registry.npmjs.org'
      - run: npm ci
      - run:  npm run release
      # Copy . npmrc to the publish directory so npm can find it
      - run:  cp /home/runner/work/_temp/.npmrc ./.npmrc
        working-directory: ./dist/releases/flex-layout
      - run: npm publish --provenance --access public
        working-directory: ./dist/releases/flex-layout
